name: Action

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Assert test
        uses: crytic/echidna-action@f7e374e42bf7131f7307a92f5549ed6b2fd17c9d # v2
        with:
          files: "tests/solidity/basic/assert.sol"
          contract: "TestAssert"
          config: "tests/solidity/basic/assert.yaml"
          solc-version: 0.6.12
          negate-exit-status: 1

      - name: Multi-abi test
        uses: crytic/echidna-action@f7e374e42bf7131f7307a92f5549ed6b2fd17c9d # v2
        with:
          files: "tests/solidity/basic/multi-abi.sol"
          contract: "B"
          multi-abi: true
          solc-version: 0.7.6
          negate-exit-status: 1
