name: "Nix and release"
on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

permissions: {}

jobs:
  nixBuild:
    name: Build ${{ matrix.name }} binary
    timeout-minutes: ${{ matrix.timeout || 30 }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux (x86_64)
            tuple: x86_64-linux
            system: x86_64-linux
            timeout: 180
          - os: ubuntu-24.04-arm
            name: Linux (aarch64)
            tuple: aarch64-linux
            system: aarch64-linux
            timeout: 180
          - os: macos-14
            name: macOS (x86_64)
            tuple: x86_64-macos
            system: x86_64-darwin
          - os: macos-14
            name: macOS (aarch64)
            tuple: aarch64-macos
            system: aarch64-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Configure Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: trailofbits
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: "(-echidna-.+$)"

      - name: Obtain version number
        id: version
        run: |
          if [[ "$GIT_REF" =~ ^refs/tags/v.* ]]; then
            echo "version=$(echo "$GIT_REF" | sed 's#^refs/tags/v##')" >> "$GITHUB_OUTPUT"
          else
            echo "version=HEAD-$(echo "$GIT_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi
        env:
          GIT_REF: ${{ github.ref }}
          GIT_SHA: ${{ github.sha }}

      - name: Build dynamic echidna
        run: |
          nix build .#echidna

      - name: Build redistributable echidna
        run: |
          nix build ".#packages.${NIX_SYSTEM}.echidna-redistributable" --out-link redistributable
          tar -czf "echidna-${{ steps.version.outputs.version }}-${{ matrix.tuple }}.tar.gz" -C ./redistributable/bin/ echidna
        env:
          NIX_SYSTEM: ${{ matrix.system }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: echidna-redistributable-${{ matrix.tuple }}
          path: echidna-${{ steps.version.outputs.version }}-${{ matrix.tuple }}.tar.gz

  release:
    name: Create release
    timeout-minutes: 10
    needs: [nixBuild]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: echidna-redistributable-*
          merge-multiple: true

      - name: Sign binaries
        uses: sigstore/gh-action-sigstore-python@a5caf349bc536fbef3668a10ed7f5cd309a4b53d # v3.2.0
        with:
          inputs: ./echidna-*.tar.gz

      - name: Create GitHub release and upload binaries
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          name: "Echidna ${{ needs.nixBuild.outputs.version }}"
          files: |
            ./echidna-*.tar.gz
            ./echidna-*.tar.gz.sigstore.json
